services:
  - type: web
    name: nitkkr-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_EXPIRE_MINUTES
        value: 60
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
